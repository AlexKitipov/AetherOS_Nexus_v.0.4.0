name: CI

on:
permissions:
  contents: read

  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Rust stable
        uses: rust-lang/rustup@v1
        with:
          toolchain: stable

      - name: Build and test workspace
        run: |
          cargo build --all
          cargo test --all

      - name: Cache cargo registry
        uses: actions/cache@v2
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
    
      - name: Cache cargo index
        uses: actions/cache@v2
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-${{ runner.os }}-
  
  kernel_build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Rust nightly
        uses: rust-lang/rustup@v1
        with:
          toolchain: nightly

      - name: Install rust-src and compiler_builtins
        run: |
          rustup component add rust-src
          rustup toolchain add nightly --profile minimal
          cargo +nightly build --release -- -Z build-std=core,alloc,compiler_builtins

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Rust stable
        uses: rust-lang/rustup@v1
        with:
          toolchain: stable

      - name: Run lint checks
        run: cargo clippy --all-targets --all-features -- -D warnings

  qemu_smoke_tests:
    runs-on: ubuntu-latest
    needs: kernel_build

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up QEMU
        run: sudo apt-get install qemu-system-x86 
    
      - name: Run QEMU smoke tests
        run: |
          qemu-system-x86_64 -kernel target/x86_64-unknown-none/release/kernel

  upload_artifacts:
    runs-on: ubuntu-latest
    needs: [kernel_build, qemu_smoke_tests]

    steps:
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: build-artifacts
          path: |
            target/x86_64-unknown-none/release/kernel
            target/release/deps/
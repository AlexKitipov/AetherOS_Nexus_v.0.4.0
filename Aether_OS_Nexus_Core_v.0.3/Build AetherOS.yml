name: Build AetherOS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./AetherOS

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add rust-src --toolchain nightly

      - name: Build kernel (no_std target)
        run: |
          cargo +nightly build -p aetheros-kernel \
            -Z build-std=core,alloc,compiler_builtins \
            --target .cargo/aetheros-x86_64.json

      - name: Build webview vnode
        run: cargo build -p webview

      - name: Run workspace tests
        run: cargo test

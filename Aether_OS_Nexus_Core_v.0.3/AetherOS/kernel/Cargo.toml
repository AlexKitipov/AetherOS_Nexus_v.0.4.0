[package]
name = "aetheros-kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { workspace = true }
aetheros_common = { path = "../common", default-features = false, features = ["alloc"] }
# Legacy cargo-bootimage wrappers look for a dependency literally named
# `bootloader`. Alias that name to bootloader_api so old tooling can detect
# the expected key without pulling the deprecated crate/runtime path.
bootloader = { workspace = true }
x86_64 = { workspace = true }
spin = { workspace = true }
conquer-once = { workspace = true }
linked_list_allocator = { workspace = true }
postcard = { workspace = true }
sha2 = { workspace = true }

[package.metadata.bootloader]
# Legacy `cargo-bootimage` compatibility:
# tools in this family expect this key to be present when resolving the kernel
# target that the bootloader should chain-load.
target = "../.cargo/aetheros-x86_64.json"


[features]
default = ["alloc"]
alloc = []
bare_metal = []

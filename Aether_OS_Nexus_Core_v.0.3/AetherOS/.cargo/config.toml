# NOTE:
# We intentionally do not define a `bootimage` cargo alias here. Cargo now warns
# when a user alias shadows an external subcommand and this behavior is being
# phased out (eventually becoming a hard error). In environments where
# `cargo-bootimage` is installed, users can also end up on an unexpected legacy
# code path that does not match this workspace's `bootloader_api` flow.
#
# Use the pinned commands from README.md or scripts/build_kernel_image.sh.
#
# We also intentionally do not set a workspace-wide `[build] target` because this
# workspace includes both host binaries/tests and the no_std kernel target. A
# forced global target causes host tests to compile against the custom target and
# can trigger duplicate `core` lang-item failures during `cargo test`.

[env]
# Prevent host shell/compiler wrapper flags from leaking into dependency builds.
# In particular, `-Z no-implicit-prelude` causes cascading missing `Option` /
# `Result` errors in crates like serde_core.
RUSTFLAGS = { value = "", force = true }
CARGO_ENCODED_RUSTFLAGS = { value = "", force = true }
CARGO_BUILD_RUSTFLAGS = { value = "", force = true }
RUST_TARGET_PATH = { value = ".cargo", force = true, relative = true }

[target.'cfg(all())']
rustflags = [
    "--check-cfg=cfg(doc_cfg)"
]
[alias]
build-host = "build -p common"
build-kernel = "build --release --target .cargo/aetheros-x86_64.json -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem -p aetheros-kernel"
build-vnode-webview = "build --release --target .cargo/aetheros-x86_64.json -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem -p webview"
build-vnode-display-compositor = "build --release --target .cargo/aetheros-x86_64.json -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem -p display-compositor"
build-vnode-init-service = "build --release --target .cargo/aetheros-x86_64.json -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem -p init-service"
build-vnode-registry = "build --release --target .cargo/aetheros-x86_64.json -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem -p registry"
build-baremetal-all = "build --release --workspace --target .cargo/aetheros-x86_64.json -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem"

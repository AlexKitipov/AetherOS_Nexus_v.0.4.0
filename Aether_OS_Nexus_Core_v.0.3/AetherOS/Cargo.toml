[workspace]
resolver = "2"
members = [
    "kernel",
    "common",
    "vnode/registry",
    "vnode/init-service",
    "Nexus/UI/vnode/display-compositor",
    "Nexus/UI/vnode/webview"
]

[workspace.package]
edition = "2021"

[workspace.dependencies]
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
serde_derive = "1.0"
bootloader = "0.11.15"
bootloader_api = "0.11.15"

[workspace.metadata]
forbid-std = true
feature-gates = { default = ["alloc"], alloc = [], serde = [] }

[profile.dev]
panic = "abort"

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
codegen-units = 1
